<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><title>ASTON 报价 V7.5 稳定增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .btn-active { background: #2563eb !important; color: white !important; }
        .tier-td { padding: 10px; background: #1e293b; color: white; font-weight: 700; border-radius: 8px; }
        .active-tier-td { background: #2563eb !important; }
        input, select { appearance: none; -webkit-appearance: none; border-radius: 0.75rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-2"></div><p class="text-xs font-bold text-slate-400">LOADING V7.5...</p></div>
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6">
        <div class="flex-1 space-y-6">
            <div class="flex items-center gap-3"><div class="bg-blue-600 text-white p-2 rounded-lg font-black italic text-xl">ASTON</div><h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">System <span class="text-blue-600 text-sm">V7.5</span></h1></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <select id="sales-sel" onchange="calculate()" class="p-3 border rounded-xl text-sm font-bold bg-white w-full"></select>
                <select id="country-sel" onchange="calculate()" class="p-3 border rounded-xl text-sm font-bold bg-white w-full"></select>
                <input type="text" id="client" oninput="calculate()" placeholder="Client Name..." class="p-3 border rounded-xl text-sm font-bold bg-white w-full">
            </div>
            <div class="card p-6 space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">01. Style Selection</h3>
                <div id="style-btns" class="grid grid-cols-2 md:grid-cols-3 gap-2"></div>
                <div id="manual-area" class="hidden p-4 bg-blue-50 border border-blue-200 rounded-xl grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold text-blue-800">Manual Labor (RMB)</label><input type="number" id="m-labor" value="25" oninput="calculate()" class="w-full p-2 border rounded-lg mt-1 font-bold"></div>
                    <div><label class="text-[10px] font-bold text-blue-800">Manual Cons. (㎡)</label><input type="number" id="m-cons" value="0.5" oninput="calculate()" class="w-full p-2 border rounded-lg mt-1 font-bold"></div>
                </div>
                <div class="flex gap-4 items-center bg-slate-50 p-4 rounded-xl border border-dashed">
                    <img id="style-img" src="" class="h-24 w-24 object-contain rounded-lg bg-white border" onerror="this.src='https://via.placeholder.com/300?text=IMAGE+ERROR'">
                    <div class="flex-1"><p id="style-name" class="text-lg font-black uppercase text-slate-800"></p><p id="size-info" class="text-xs font-bold text-blue-600 mt-1"></p></div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="card p-6 space-y-3"><h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">02. Modifiers</h3><div id="mod-btns" class="grid grid-cols-2 gap-2"></div></div><div class="card p-6 space-y-3"><h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">03. Size Matrix</h3><div id="size-btns" class="grid grid-cols-4 gap-2"></div></div></div>
            <div class="card p-6 space-y-4"><h3 class="text-xs font-black text-emerald-600 uppercase tracking-widest">04. Processes</h3><div id="proc-list" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div></div>
            <div class="card p-6 space-y-4"><h3 class="text-xs font-black text-orange-600 uppercase tracking-widest">05. Fabrics</h3>
                <div class="p-4 bg-orange-50 border border-orange-200 rounded-xl grid grid-cols-3 gap-3">
                    <div><label class="text-[9px] font-bold text-orange-800 uppercase">Manual Price</label><input type="number" id="mf-price" value="0" oninput="selFabric=null;renderFabrics()" class="w-full p-2 border rounded-lg mt-1 text-xs font-bold"></div>
                    <div><label class="text-[9px] font-bold text-orange-800 uppercase">GSM</label><input type="number" id="mf-gsm" value="0" class="w-full p-2 border rounded-lg mt-1 text-xs"></div>
                    <div><label class="text-[9px] font-bold text-orange-800 uppercase">Width (cm)</label><input type="number" id="mf-width" value="0" class="w-full p-2 border rounded-lg mt-1 text-xs"></div>
                </div>
                <input type="text" id="f-search" oninput="renderFabrics()" placeholder="Search fabric..." class="w-full p-3 border rounded-xl text-sm font-bold bg-slate-50">
                <div id="f-list" class="max-h-60 overflow-y-auto space-y-2 pr-2"></div>
            </div>
            <div class="card p-6 space-y-4"><h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">06. Packaging</h3><div id="pkg-btns" class="grid grid-cols-3 gap-2"></div><div class="p-4 bg-slate-50 border rounded-xl flex justify-between items-center"><span class="text-[10px] font-bold text-slate-500 uppercase">Manual Pkg (RMB)</span><input type="number" id="m-pkg" value="0" oninput="calculate()" class="w-24 p-2 border rounded-lg text-sm font-black text-right"></div></div>
        </div>
        <div class="w-full md:w-96">
            <div class="card bg-slate-900 text-white p-8 space-y-8 sticky top-8 shadow-2xl text-center">
                <div><p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-2">Sale Price USD</p><div class="text-7xl font-black tracking-tighter">$<span id="res-usd">0.00</span></div></div>
                <div class="grid grid-cols-2 gap-4 py-6 border-y border-slate-800"><div><p class="text-slate-500 text-[10px] font-bold uppercase">RMB</p><p id="res-rmb" class="text-2xl font-black">¥ 0.00</p></div><div><p class="text-emerald-500 text-[10px] font-bold uppercase">MOQ</p><p id="res-moq" class="text-2xl font-black text-emerald-400">0</p></div></div>
                <div class="space-y-4"><h4 class="text-[10px] font-black text-slate-500 uppercase">Tiered Pricing</h4><table class="w-full border-separate border-spacing-y-2"><tbody id="tier-body"></tbody></table></div>
                <button onclick="window.print()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm uppercase">Export Quote</button>
            </div>
        </div>
    </div>
    <script src="./data.js"></script>
    <script>
        let activeStyle=DB.styles[0], activeMods=[], activeSizes=[], selFabric=null, activePkg=DB.pkgs[0];
        function init() {
            const ss=document.getElementById('sales-sel'); DB.sales.forEach(n=>ss.add(new Option(n,n)));
            const cs=document.getElementById('country-sel'); DB.countries.forEach(n=>cs.add(new Option(n,n)));
            const st=document.getElementById('style-btns'); DB.styles.forEach((s,i)=>{
                const b=document.createElement('button'); b.innerText=s.name;
                b.className=`p-3 text-left rounded-xl text-xs border font-bold transition-all ${i===0?'btn-active':'bg-white text-slate-500'}`;
                b.onclick=()=>{ document.querySelectorAll('#style-btns button').forEach(x=>x.className="p-3 text-left rounded-xl text-xs border font-bold bg-white text-slate-500"); b.className="p-3 text-left rounded-xl text-xs border font-bold btn-active"; activeStyle=s; document.getElementById('manual-area').className=i===0?'p-4 bg-blue-50 border border-blue-200 rounded-xl grid grid-cols-2 gap-4':'hidden'; renderUI(); };
                st.appendChild(b);
            });
            const sz=document.getElementById('size-btns'); Object.keys(DB.styles[1].sizes).forEach(k=>{
                const b=document.createElement('button'); b.innerText=k; b.className="p-2 rounded-lg text-xs border bg-white text-slate-400 font-black";
                b.onclick=()=>{ if(activeSizes.includes(k)) activeSizes=activeSizes.filter(x=>x!==k); else activeSizes.push(k); b.classList.toggle('btn-active'); updateSizes(); };
                sz.appendChild(b);
            });
            const pb=document.getElementById('pkg-btns'); DB.pkgs.forEach((p,i)=>{
                const b=document.createElement('button'); b.innerText=p.name;
                b.className=`p-2 rounded-lg text-xs border font-bold ${i===0?'btn-active':'bg-white text-slate-500'}`;
                b.onclick=()=>{ document.querySelectorAll('#pkg-btns button').forEach(x=>x.className="p-2 rounded-lg text-xs border font-bold bg-white text-slate-500"); b.className="p-2 rounded-lg text-xs border font-bold btn-active"; activePkg=p; calculate(); };
                pb.appendChild(b);
            });
            renderUI(); setTimeout(() => document.getElementById('loader').style.display='none', 500);
        }
        function renderUI() { document.getElementById('style-img').src=activeStyle.img; document.getElementById('style-name').innerText=activeStyle.name; renderMods(); renderProc(); renderFabrics(); calculate(); }
        function renderMods() {
            const g=document.getElementById('mod-btns'); g.innerHTML=""; const sR=activeStyle.name.replace(/[0-9.\s]/g,'');
            DB.modifiers.forEach(m=>{ const tR=m.target.replace(/[0-9.\s]/g,''); if(tR==="通用"||sR.includes(tR)||tR.includes(sR)) {
                const b=document.createElement('button'); b.innerText=m.name; const act=activeMods.some(x=>x.name===m.name);
                b.className=`p-2 rounded-lg text-xs border font-bold ${act?'btn-active':'bg-white text-slate-500'}`;
                b.onclick=()=>{ if(act) activeMods=activeMods.filter(x=>x.name!==m.name); else activeMods.push(m); renderMods(); calculate(); };
                g.appendChild(b);
            } });
        }
        function renderProc() {
            const g=document.getElementById('proc-list'); g.innerHTML=""; const sR=activeStyle.name.replace(/[0-9.\s]/g,'');
            DB.processes.forEach(p=>{ if(p.targets.some(t=>{ const tR=t.replace(/[0-9.\s]/g,''); return tR==="通用"||sR.includes(tR)||tR.includes(sR); })) {
                const d=document.createElement('label'); d.className="p-4 bg-white border rounded-xl flex justify-between items-center cursor-pointer";
                d.innerHTML=`<div class="flex items-center gap-3"><input type="checkbox" onchange="calculate()" data-name="${p.name}" class="w-5 h-5 rounded"><span class="text-sm font-bold text-slate-700">${p.name}</span></div><span class="font-black text-emerald-600">¥${p.price.toFixed(2)}</span>`;
                g.appendChild(d);
            } });
        }
        function renderFabrics() {
            const s=document.getElementById('f-search').value.toLowerCase(); const g=document.getElementById('f-list'); g.innerHTML="";
            DB.fabrics.filter(f=>f.name.toLowerCase().includes(s)||f.id.includes(s)).forEach(f=>{
                const act=selFabric?.id===f.id; const d=document.createElement('div');
                d.className=`p-3 border rounded-xl flex justify-between items-center cursor-pointer ${act?'bg-orange-50 border-orange-400 ring-2 ring-orange-100':'bg-white'}`;
                d.innerHTML=`<div class="flex flex-col"><span class="text-[10px] text-slate-400 font-bold uppercase">ID: ${f.id} | ${f.desc}</span><span class="text-sm font-black text-slate-800">${f.name}</span><span class="text-[9px] text-slate-400 font-bold">${f.gsm}GSM / ${f.width}CM</span></div><div class="text-right"><span class="text-xs font-black text-orange-600 block">¥${f.price_loose.toFixed(2)} (散)</span><span class="text-[10px] font-bold text-slate-500">¥${f.price_roll.toFixed(2)} (整)</span></div>`;
                d.onclick=()=>{ selFabric=f; document.getElementById('mf-price').value=0; renderFabrics(); };
                g.appendChild(d);
            });
            calculate();
        }
        function updateSizes() { const keys=Object.keys(activeStyle.sizes); const sorted=activeSizes.sort((a,b)=>keys.indexOf(a)-keys.indexOf(b)); const mid=sorted[Math.floor(sorted.length/2)]; document.getElementById('size-info').innerText=mid?"基准尺码: "+mid:""; calculate(); }
        function calculate() {
            const mText=document.getElementById('size-info').innerText; const mid=mText.replace('基准尺码: ','');
            let qC=0, labor=0; if(activeStyle.name.includes("手动")) { qC=parseFloat(document.getElementById('m-cons').value)||0; labor=parseFloat(document.getElementById('m-labor').value)||0; } else { if(!mid) return; qC=activeStyle.sizes[mid]||0; labor=activeStyle.baseLabor; }
            let fP=selFabric?selFabric.price_loose:parseFloat(document.getElementById('mf-price').value)||0;
            let f=1; activeMods.forEach(m=>f*=m.factor); qC*=f; let moq=Math.round(20/(qC*0.22))||0; document.getElementById('res-moq').innerText=moq;
            let ex=0; document.querySelectorAll('#proc-list input:checked').forEach(i=>{ let p=DB.processes.find(x=>x.name===i.dataset.name); if(p) { let pp=p.price; if(p.name.includes("定染拉链")) pp=moq<300?2.8:moq<1000?2.2:1.6; ex+=pp; } });
            const rmb=(qC*fP*1.1+labor+ex+(parseFloat(document.getElementById('m-pkg').value)||activePkg.price))/0.7; const usd=rmb/6.7;
            document.getElementById('res-usd').innerText=usd.toFixed(2); document.getElementById('res-rmb').innerText="¥ "+rmb.toFixed(2);
            const tb=document.getElementById('tier-body'); tb.innerHTML=""; const cur=moq<100?0:moq<300?1:moq<500?2:3; const bks=["0-99","100-299","300-499",">500"];
            bks.forEach((l,i)=>{ const p=usd+(cur-i)*(usd<3?0.1:0.15); tb.innerHTML+=`<tr><td class="tier-td ${i===cur?'active-tier-td':''} text-[10px] uppercase">${l}</td><td class="text-right font-black text-2xl">$${p.toFixed(2)}</td></tr>`; });
        }
        init();
    </script>
</body>
</html>

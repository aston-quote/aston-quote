<html lang="zh-CN">

        .btn-active { background: #2563eb !important; color: white !important; border-color: #2563eb !important; }

<body class="p-4 md:p-8">

                </div>
                <div class="flex flex-wrap gap-3">

                    <select id="country-sel" onchange="calculate()" class="p-3 border rounded-xl text-sm font-bold bg-white shadow-sm w-40"></select>
                    <input type="text" id="client" oninput="calculate()" placeholder="输入客户名称..." class="p-3 border rounded-xl text-sm font-bold bg-white shadow-sm w-48">
                </div>
            </div>

            <!-- 01 版型 -->
            <div class="card p-6 space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">01. 版型选择 & 手动录入</h3>
                <div id="style-btns" class="grid grid-cols-2 md:grid-cols-3 gap-2"></div>
                
                <div id="manual-area" class="hidden p-4 bg-blue-50 border border-blue-200 rounded-xl grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold text-blue-800">手动工费 (RMB)</label><input type="number" id="m-labor" value="25" oninput="calculate()" class="w-full p-2 border rounded-lg mt-1"></div>
                    <div><label class="text-[10px] font-bold text-blue-800">手动用料 (㎡)</label><input type="number" id="m-cons" value="0.5" oninput="calculate()" class="w-full p-2 border rounded-lg mt-1"></div>
                </div>

                <div class="flex gap-4 items-center bg-slate-50 p-4 rounded-xl border border-dashed">
                    <img id="style-img" src="" class="h-24 w-24 object-contain rounded-lg bg-white border" onerror="this.src='https://via.placeholder.com/300?text=IMAGE+ERROR'">
                    <div>
                        <p id="style-name" class="text-lg font-black uppercase text-slate-800"></p>
                        <p id="size-info" class="text-xs font-bold text-blue-600 mt-1"></p>
                    </div>
                </div>
            </div>

            <!-- 02 修正 & 尺码 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card p-6 space-y-3">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">02. 修正系数</h3>
                    <div id="mod-btns" class="grid grid-cols-2 gap-2"></div>
                </div>
                <div class="card p-6 space-y-3">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">03. 尺码矩阵</h3>
                    <div id="size-btns" class="grid grid-cols-4 gap-2"></div>
                </div>
            </div>

            <!-- 04 工艺 -->
            <div class="card p-6 space-y-4">
                <h3 class="text-xs font-black text-emerald-600 uppercase tracking-widest">04. 特色工艺 (自动匹配)</h3>
                <div id="proc-list" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
            </div>

            <!-- 05 面料 -->
            <div class="card p-6 space-y-4">
                <h3 class="text-xs font-black text-orange-600 uppercase tracking-widest">05. 面料母库</h3>
                <input type="text" id="f-search" oninput="renderFabrics()" placeholder="🔍 快速搜索面料..." class="w-full p-3 border rounded-xl text-sm font-bold bg-slate-50">
                <div id="f-list" class="max-h-60 overflow-y-auto space-y-2 pr-2"></div>
            </div>
        </div>

        <!-- 右侧结果区 (固定悬浮) -->
        <div class="w-full md:w-96">
            <div class="card bg-slate-900 text-white p-8 space-y-8 sticky top-8 shadow-2xl text-center">
                <div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-2">Final Sale Price</p>
                    <div class="text-7xl font-black tracking-tighter"><span class="text-blue-500 text-3xl mr-1">$</span><span id="res-usd">0.00</span></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 py-6 border-y border-slate-800">
                    <div><p class="text-slate-500 text-[10px] uppercase font-bold">RMB Price</p><p id="res-rmb" class="text-2xl font-black">¥ 0.00</p></div>
                    <div><p class="text-emerald-500 text-[10px] uppercase font-bold">Safe MOQ</p><p id="res-moq" class="text-2xl font-black text-emerald-400">0</p></div>
                </div>

                <div class="space-y-4">

                    <table class="w-full border-separate border-spacing-y-2"><tbody id="tier-body"></tbody></table>
                </div>

            </div>
        </div>
    </div>

        let activeStyle=DB.styles[1], activeMods=[], activeSizes=[], selFabric=DB.fabrics[0];

        function init() {
            const ss=document.getElementById('sales-sel'); DB.sales.forEach(n=>ss.add(new Option(n,n)));
            const cs=document.getElementById('country-sel'); DB.countries.forEach(n=>cs.add(new Option(n,n)));
            
            const st=document.getElementById('style-btns');
            DB.styles.forEach((s,i)=>{
                const b=document.createElement('button'); b.innerText=s.name;
                b.className=`p-3 text-left rounded-xl text-xs border font-bold transition-all ${i===1?'btn-active':'bg-white text-slate-500 hover:border-slate-400'}`;
                b.onclick=()=>{
                    document.querySelectorAll('#style-btns button').forEach(x=>x.className="p-3 text-left rounded-xl text-xs border font-bold bg-white text-slate-500 hover:border-slate-400");
                    b.className="p-3 text-left rounded-xl text-xs border font-bold btn-active";
                    activeStyle=s; 
                    document.getElementById('manual-area').className = i===0 ? 'p-4 bg-blue-50 border border-blue-200 rounded-xl grid grid-cols-2 gap-4' : 'hidden';
                    renderUI();
                };
                st.appendChild(b);
            });

            const sz=document.getElementById('size-btns');
            Object.keys(DB.styles[1].sizes).forEach(k=>{
                const b=document.createElement('button'); b.innerText=k;
                b.className="p-2 rounded-lg text-xs border bg-white text-slate-400 font-black hover:border-slate-400";
                b.onclick=()=>{
                    if(activeSizes.includes(k)) activeSizes=activeSizes.filter(x=>x!==k); else activeSizes.push(k);
                    b.classList.toggle('btn-active'); updateSizes();
                };
                sz.appendChild(b);
            });
            renderUI();
        }

        function renderUI() {
            document.getElementById('style-img').src = activeStyle.img;
            document.getElementById('style-name').innerText = activeStyle.name;
            renderMods(); renderProc(); renderFabrics(); calculate();
        }

        function renderMods() {
            const g=document.getElementById('mod-btns'); g.innerHTML="";
            const sR=activeStyle.name.replace(/[0-9.\s]/g,'');
            DB.modifiers.forEach(m=>{
                const tR=m.target.replace(/[0-9.\s]/g,'');
                if(tR==="通用"||sR.includes(tR)||tR.includes(sR)) {
                    const b=document.createElement('button'); b.innerText=m.name;
                    const act=activeMods.some(x=>x.name===m.name);
                    b.className=`p-2 rounded-lg text-xs border font-bold transition-all ${act?'btn-active':'bg-white text-slate-500 hover:border-slate-400'}`;
                    b.onclick=()=>{
                        if(act) activeMods=activeMods.filter(x=>x.name!==m.name); else activeMods.push(m);
                        renderMods(); calculate();
                    };
                    g.appendChild(b);
                }
            });
        }

        function renderProc() {
            const g=document.getElementById('proc-list');
            const checked=Array.from(document.querySelectorAll('#proc-list input:checked')).map(i=>i.dataset.name);
            g.innerHTML=""; const sR=activeStyle.name.replace(/[0-9.\s]/g,'');
            DB.processes.forEach(p=>{
                if(p.targets.some(t=>{ const tR=t.replace(/[0-9.\s]/g,''); return tR==="通用"||sR.includes(tR)||tR.includes(sR); })) {
                    const d=document.createElement('label');
                    d.className="p-4 bg-white border rounded-xl flex justify-between items-center cursor-pointer hover:border-emerald-400 transition-all";
                    d.innerHTML=`<div class="flex items-center gap-3"><input type="checkbox" onchange="calculate()" data-name="${p.name}" ${checked.includes(p.name)?'checked':''} class="w-5 h-5 rounded"> <span class="text-sm font-bold text-slate-700">${p.name}</span></div> <span class="font-black text-emerald-600">¥${p.price.toFixed(2)}</span>`;
                    g.appendChild(d);
                }
            });
        }

        function renderFabrics() {
            const s=document.getElementById('f-search').value.toLowerCase();
            const g=document.getElementById('f-list'); g.innerHTML="";
            DB.fabrics.filter(f=>f.name.toLowerCase().includes(s)).forEach(f=>{
                const act=selFabric?.id===f.id;
                const d=document.createElement('div');
                d.className=`p-4 border rounded-xl flex justify-between items-center cursor-pointer transition-all ${act?'bg-orange-50 border-orange-400 ring-2 ring-orange-100':'bg-white hover:border-slate-300'}`;
                d.innerHTML=`<span class="text-sm font-black text-slate-800">${f.name}</span><span class="text-base font-black text-orange-600">¥${f.price_loose.toFixed(2)}</span>`;
                d.onclick=()=>{ selFabric=f; renderFabrics(); };
                g.appendChild(d);
            });
            calculate();
        }

        function updateSizes() {
            const keys=Object.keys(DB.styles[1].sizes);
            const sorted=activeSizes.sort((a,b)=>keys.indexOf(a)-keys.indexOf(b));
            const mid=sorted[Math.floor(sorted.length/2)];
            document.getElementById('size-info').innerText=mid?"基准尺码: "+mid:"";
            calculate();
        }

        function calculate() {
            const mText=document.getElementById('size-info').innerText;
            const mid=mText.includes(': ')?mText.split(': ')[1]:null;
            
            let qCons=0, labor=0;
            if(activeStyle.name.includes("手动")) {
                qCons = parseFloat(document.getElementById('m-cons').value) || 0;
                labor = parseFloat(document.getElementById('m-labor').value) || 0;
            } else {
                if(!mid) return;
                qCons = activeStyle.sizes[mid] || 0;
                labor = activeStyle.baseLabor;
            }

            if(!selFabric) return;
            let f=1.0; activeMods.forEach(m=>f*=m.factor); qCons*=f;
            let extra=0;
            document.querySelectorAll('#proc-list input:checked').forEach(i=>{
                const p=DB.processes.find(x=>x.name===i.dataset.name); if(p)extra+=p.price;
            });

            const rmb=(qCons*selFabric.price_loose*1.1+labor+extra+1.5)/0.7;
            const usd=rmb/6.7;
            document.getElementById('res-usd').innerText=usd.toFixed(2);
            document.getElementById('res-rmb').innerText="¥ "+rmb.toFixed(2);
            let moq=Math.round(20/(qCons*0.22));
            document.getElementById('res-moq').innerText=moq;

            const diff=usd<1.5?0.05:usd<3?0.1:usd<5?0.15:0.2;
            const tb=document.getElementById('tier-body'); tb.innerHTML="";
            const curIdx=moq<100?0:moq<300?1:moq<500?2:3;
            const brks=["0-99","100-299","300-499",">500"];
            brks.forEach((l,i)=>{
                const p=usd+(curIdx-i)*diff;
                tb.innerHTML+=`<tr><td class="tier-td ${i===curIdx?'active-tier-td':''} text-[10px] tracking-widest uppercase">${l} PCS</td><td class="text-right font-black text-2xl">$${p.toFixed(2)}</td></tr>`;
            });
        }
        init();
    </script>

sm": 220.0, "width": 160.0, "price_loose": 15.0, "price_roll": 8.0, "unit": "kg", "rollQty": 25.0}, {"id": "GD6710", "name": "双刷单摇粒绒", "desc": "100涤", "gsm": 270.0, "width": 165.0, "price_loose": 15.0, "price_roll": 9.0, "unit": "kg", "rollQty": 25.0}, {"id": "GD25230", "name": "豆豆绒（压泡绒）", "desc": "100涤", "gsm": 230.0, "width": 160.0, "price_loose": 14.0, "price_roll": 7.0, "unit": "kg", "rollQty": 25.0}, {"id": "A-7-230", "name": "150D/144F双刷单摇", "desc": "100涤", "gsm": 230.0, "width": 155.0, "price_loose": 15.0, "price_roll": 9.0, "unit": "kg", "rollQty": 25.0}, {"id": "/", "name": "泰迪绒", "desc": "100涤", "gsm": 445.0, "width": 160.0, "price_loose": 20.0, "price_roll": 13.0, "unit": "kg", "rollQty": 40.0}, {"id": "3003#", "name": "色织汗布", "desc": "95棉5涤纶", "gsm": 180.0, "width": 175.0, "price_loose": 21.0, "price_roll": 13.5, "unit": "kg", "rollQty": 23.0}, {"id": "5003#", "name": "色织卫衣布", "desc": "95棉5氨纶", "gsm": 240.0, "width": 185.0, "price_loose": 25.0, "price_roll": 14.5, "unit": "kg", "rollQty": 24.0}, {"id": "JY2032", "name": "2CM格子空气层保暖面料", "desc": "70%棉30%涤", "gsm": 320.0, "width": 180.0, "price_loose": 23.0, "price_roll": 16.5, "unit": "kg", "rollQty": 23.0}, {"id": "BX-827", "name": "300g双面毛巾布", "desc": "100%棉", "gsm": 300.0, "width": 150.0, "price_loose": 23.0, "price_roll": 19.0, "unit": "m", "rollQty": 60.0}, {"id": "BX-843", "name": "250g单面毛巾布", "desc": "100%棉", "gsm": 250.0, "width": 152.0, "price_loose": 19.0, "price_roll": 16.0, "unit": "m", "rollQty": 70.0}, {"id": "BX-804", "name": "针织毛巾布", "desc": "80%棉20%涤", "gsm": 220.0, "width": 152.0, "price_loose": 18.0, "price_roll": 12.8, "unit": "kg", "rollQty": 23.0}, {"id": "GZZZ001", "name": "针织毛巾布", "desc": "80%棉20%涤", "gsm": 245.0, "width": 165.0, "price_loose": 18.0, "price_roll": 14.5, "unit": "kg", "rollQty": 23.0}, {"id": "GZZZ002", "name": "300G全棉双面毛巾布", "desc": "100%棉", "gsm": 300.0, "width": 150.0, "price_loose": 25.0, "price_roll": 20.0, "unit": "kg", "rollQty": 23.0}, {"id": "A-317#", "name": "轻薄亚麻棉", "desc": "30%亚麻70%棉", "gsm": 130.0, "width": 140.0, "price_loose": 20.0, "price_roll": 17.5, "unit": "m", "rollQty": 50.0}, {"id": "5147#", "name": "亚麻棉", "desc": "30%亚麻70%棉", "gsm": 205.0, "width": 140.0, "price_loose": 15.0, "price_roll": 13.0, "unit": "m", "rollQty": 50.0}, {"id": null, "name": "棉毛布涂料数码印花", "desc": null, "gsm": 0, "width": 0, "price_loose": 0, "price_roll": 0, "unit": "kg", "rollQty": 0}, {"id": null, "name": "卫衣布涂料数码印花", "desc": null, "gsm": 0, "width": 0, "price_loose": 0, "price_roll": 0, "unit": "kg", "rollQty": 0}, {"id": null, "name": "竹纤维氨纶汗布", "desc": null, "gsm": 0, "width": 0, "price_loose": 0, "price_roll": 0, "unit": "kg", "rollQty": 0}, {"id": null, "name": "氨纶汗布数码印花", "desc": null, "gsm": 0, "width": 0, "price_loose": 0, "price_roll": 0, "unit": "kg", "rollQty": 0}],
            pkgs: [{"name": "普通包装", "price": 1.0, "desc": "简单款式，常规透明袋"}, {"name": "标准包装", "price": 1.5, "desc": "套装/成人单件，含挂牌、腰封、特殊包装"}, {"name": "礼盒包装", "price": 2.0, "desc": "成人套装，精品礼盒装"}],
            config: {"exchange_rate": 6.7, "margin_coefficient": 0.7, "packaging_cost": 0.0}
        };

        let activeStyle = DB.styles[1] || DB.styles[0];
        let activeMods = []; let activeSizes = []; let mode = 'loose';
        let selFabric = DB.fabrics[0] || null; let selPkg = DB.pkgs[0] || null;
        let isMF = false;

        function init() {
            const st = document.getElementById('style-buttons');
            DB.styles.forEach((s, i) => {
                const b = document.createElement('button'); b.className = `p-3 rounded-xl text-[10px] text-left border font-bold ${i === 1 ? 'btn-active' : 'bg-white text-slate-500'}`;
                b.innerText = s.name; b.onclick = () => {
                    document.querySelectorAll('#style-buttons button').forEach(btn => { btn.className = "p-3 rounded-xl text-[10px] text-left border font-bold bg-white text-slate-500"; });
                    b.className = "p-3 rounded-xl text-[10px] text-left border font-bold btn-active"; activeStyle = s; updateStyle();
                };
                st.appendChild(b);
            });
            const sg = document.getElementById('size-grid');
            const sampleSizes = DB.styles[1] ? Object.keys(DB.styles[1].sizes) : [];
            sampleSizes.forEach(sz => {
                const b = document.createElement('button'); b.className = "size-btn text-[9px] py-2 rounded-xl font-black uppercase bg-white text-slate-400";
                b.innerText = sz; b.onclick = () => {
                    if(activeSizes.includes(sz)) activeSizes = activeSizes.filter(x => x !== sz); else activeSizes.push(sz);
                    b.classList.toggle('active'); updateSizes();
                };
                sg.appendChild(b);
            });
            const pg = document.getElementById('pkg-grid');
            DB.pkgs.forEach((p, i) => {
                const d = document.createElement('div'); d.className = `pkg-card ${i === 0 ? 'active' : ''}`;
                d.innerHTML = `<p class="text-xs font-black">${p.name}</p><p class="text-sm font-black text-purple-600">¥${p.price}</p>`;
                d.onclick = () => { document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('active')); d.classList.add('active'); selPkg = p; calculate(); };
                pg.appendChild(d);
            });
            updateStyle();
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function updateStyle() {
            document.getElementById('style-img').src = activeStyle.img || 'https://via.placeholder.com/200?text=MANUAL';
            document.getElementById('style-display-name').innerText = activeStyle.name;
            renderMods(); renderProc(); renderFabrics();
        }

        function renderMods() {
            const g = document.getElementById('modifier-grid'); g.innerHTML = "";
            const pref = activeStyle.name.split('.')[0];
            DB.modifiers.filter(m => m.target.includes(pref) || m.target.includes("通用")).forEach(m => {
                const d = document.createElement('div'); const active = activeMods.some(x => x.name === m.name);
                d.className = `modifier-card ${active ? 'active' : ''}`; d.innerText = m.name;
                d.onclick = () => {
                    if(activeMods.some(x => x.name === m.name)) activeMods = activeMods.filter(x => x.name !== m.name); else activeMods.push(m);
                    renderMods(); calculate();
                };
                g.appendChild(d);
            });
        }

        function renderProc() {
            const g = document.getElementById('process-grid'); g.innerHTML = "";
            const pref = activeStyle.name.split('.')[0];
            const checked = Array.from(document.querySelectorAll('#process-grid input:checked')).map(i => i.dataset.name);
            DB.processes.filter(p => p.targets.includes(pref) || p.targets.includes("通用")).forEach(p => {
                const d = document.createElement('div'); d.className = "px-4 py-3 bg-white border rounded-2xl flex items-center cursor-pointer";
                d.innerHTML = `<input type="checkbox" onchange="calculate()" data-name="${p.name}" ${checked.includes(p.name)?'checked':''} class="mr-2"> <span class="text-[10px] font-black">${p.name}</span><span class="ml-auto text-emerald-600 font-bold text-[10px]">¥${p.price}</span>`;
                g.appendChild(d);
            });
        }

        function renderFabrics() {
            const s = document.getElementById('fabric-search').value.toLowerCase();
            const g = document.getElementById('fabric-list'); g.innerHTML = "";
            DB.fabrics.filter(f => f.name.toLowerCase().includes(s)).forEach(f => {
                const p = mode === 'loose' ? f.price_loose : f.price_roll;
                const d = document.createElement('div'); d.className = `fabric-item p-3 rounded-xl border cursor-pointer ${selFabric?.id === f.id ? 'active' : 'bg-white'}`;
                d.innerHTML = `<div class="flex justify-between items-center"><span class="text-[10px] font-black">${f.name}</span><span class="text-orange-600 font-bold text-[10px]">¥${p}</span></div>`;
                d.onclick = () => { isMF = false; selFabric = f; renderFabrics(); };
                g.appendChild(d);
            });
            calculate();
        }

        function updateSizes() {
            if(activeSizes.length === 0) { document.getElementById('size-tag').classList.add('hidden'); calculate(); return; }
            const idxs = Object.keys(DB.styles[1].sizes);
            const sorted = activeSizes.sort((a,b) => idxs.indexOf(a) - idxs.indexOf(b));
            const mid = sorted[Math.floor(sorted.length / 2)];
            document.getElementById('ref-size').innerText = mid;
            document.getElementById('size-tag').classList.remove('hidden'); calculate();
        }

        function setMode(m) { mode = m; document.getElementById('mode-loose').classList.toggle('btn-active', m==='loose'); document.getElementById('mode-roll').classList.toggle('btn-active', m==='roll'); renderFabrics(); }
        function updateSummary() { document.getElementById('p-sales').innerText = document.getElementById('sales-name').value; document.getElementById('p-country').innerText = document.getElementById('country-name').value; }
        function onMFInput() { isMF = true; calculate(); }

        function calculate() {
            const ref = document.getElementById('ref-size').innerText;
            const mc = parseFloat(document.getElementById('manual-cons').value);
            if(!activeStyle || (!ref && isNaN(mc))) return;

            let qCons = 0, mCons = 0;
            if(!isNaN(mc)) { qCons = mc; mCons = mc; } 
            else {
                const szs = Object.keys(activeStyle.sizes); const i = szs.indexOf(ref);
                const mSz = i > 0 ? szs[i-1] : ref;
                qCons = activeStyle.sizes[ref] || 0; mCons = activeStyle.sizes[mSz] || 0;
            }
            let fact = 1.0; activeMods.forEach(m => fact *= m.factor); qCons *= fact; mCons *= fact;

            let fP = 0, fG = 0, fW = 0, fQ = 0, fU = 'kg';
            if(isMF) {
                fP = (mode === 'loose' ? parseFloat(document.getElementById('mf-loose').value) : parseFloat(document.getElementById('mf-roll').value)) || 0;
                fG = parseFloat(document.getElementById('mf-gsm').value) || 0; fW = parseFloat(document.getElementById('mf-width').value) || 0;
                fQ = parseFloat(document.getElementById('mf-qty').value) || 0; fU = document.getElementById('mf-unit').value;
            } else if(selFabric) {
                fP = mode === 'loose' ? selFabric.price_loose : selFabric.price_roll;
                fG = selFabric.gsm; fW = selFabric.width; fQ = selFabric.rollQty; fU = selFabric.unit;
            }

            const ml = parseFloat(document.getElementById('manual-labor').value);
            const labor = !isNaN(ml) ? ml : activeStyle.baseLabor;
            document.getElementById('display-labor').innerText = "¥ " + labor.toFixed(2);
            document.getElementById('display-cons').innerText = qCons.toFixed(3) + " ㎡";

            let moq = 0;
            if(fU.toLowerCase()==='kg') { const uU = mCons * (fG/1000); moq = uU > 0 ? fQ/uU : 0; } 
            else { const uU = fW > 0 ? (mCons/(fW/100)) : 0; moq = uU > 0 ? fQ/uU : 0; }
            if(isMF || !isNaN(mc)) moq *= 1.07;
            moq = Math.round(moq); document.getElementById('res-moq').innerText = moq;

            let extra = 0;
            document.querySelectorAll('#process-grid input:checked').forEach(c => {
                const p = DB.processes.find(x => x.name === c.dataset.name);
                let pp = p.price; if(p.tiers) { const m = p.tiers.find(t => moq >= t.qty); if(m) pp = m.price; }
                extra += pp;
            });

            const pkg = selPkg ? selPkg.price : 0;
            const rmb = (qCons * fP * 1.1 + labor + extra + pkg) / DB.config.margin_coefficient;
            const usd = rmb / DB.config.exchange_rate;

            document.getElementById('res-usd').innerText = usd.toFixed(2);
            document.getElementById('res-rmb').innerText = "¥ " + rmb.toFixed(2);
            document.getElementById('audit').innerText = `[(${qCons.toFixed(2)}*${fP}*1.1 + ${labor} + ${extra} + ${pkg})/0.7]/6.7`;

            const getD = (p) => p < 1.5 ? 0.05 : p < 3 ? 0.1 : p < 5 ? 0.15 : p < 7 ? 0.2 : 0.25;
            const diff = getD(usd);
            const getB = (q) => q < 100 ? 0 : q < 300 ? 1 : q < 500 ? 2 : 3;
            const curB = getB(moq);
            const brks = [{l:"0-99"}, {l:"100-299"}, {l:"300-499"}, {l:">500"}];
            const tb = document.getElementById('tier-body'); tb.innerHTML = "";
            brks.forEach((b, idx) => {
                const tp = usd + (curB - idx) * diff;
                const tr = document.createElement('tr'); if(idx===curB) tr.className="active-tier";
                tr.innerHTML = `<td>${b.l}</td><td class="text-right">$${tp.toFixed(2)}</td>`;
                tb.appendChild(tr);
            });
        }
        init();
    </script>

        let activeStyle = DB.styles[0]; let activeMods = []; let activeSizes = []; let selFabric = DB.fabrics[0];

        function init() {
            const st = document.getElementById('style-btns');
            DB.styles.forEach((s, i) => {
                const b = document.createElement('button');
                b.innerText = s.name;
                b.className = `p-3 text-left rounded-xl text-xs border font-bold transition-all btn-hover ${i===0?'btn-active':'bg-white text-slate-600'}`;
                b.onclick = () => {
                    document.querySelectorAll('#style-btns button').forEach(x => x.className = "p-3 text-left rounded-xl text-xs border font-bold transition-all bg-white text-slate-600 btn-hover");
                    b.className = "p-3 text-left rounded-xl text-xs border font-bold transition-all btn-active";
                    activeStyle = s; renderUI();
                };
                st.appendChild(b);
            });

            const sz = document.getElementById('size-btns');
            Object.keys(DB.styles[0].sizes).forEach(k => {
                const b = document.createElement('button');
                b.innerText = k;
                b.className = "p-2 rounded-lg text-[10px] border bg-white text-slate-400 font-black hover:border-slate-400 transition-all";
                b.onclick = () => {
                    if(activeSizes.includes(k)) activeSizes = activeSizes.filter(x => x!==k);
                    else activeSizes.push(k);
                    b.classList.toggle('btn-active');
                    updateSizes();
                };
                sz.appendChild(b);
            });
            renderUI();
        }

        function renderUI() {
            document.getElementById('style-img').src = activeStyle.img;
            document.getElementById('style-name').innerText = activeStyle.name;
            renderMods(); renderProc(); renderFabrics(); calculate();
        }

        function renderMods() {
            const g = document.getElementById('mod-btns'); g.innerHTML = "";
            const styleRaw = activeStyle.name.replace(/[0-9.\s]/g, '');
            DB.modifiers.forEach(m => {
                const targetRaw = m.target.replace(/[0-9.\s]/g, '');
                if(targetRaw === "通用" || styleRaw.includes(targetRaw) || targetRaw.includes(styleRaw)) {
                    const b = document.createElement('button');
                    const act = activeMods.some(x => x.name === m.name);
                    b.innerText = m.name + " (" + m.factor + ")";
                    b.className = `p-2 rounded-lg text-[10px] border font-bold transition-all ${act?'btn-active':'bg-white text-slate-500'}`;
                    b.onclick = () => {
                        if(act) activeMods = activeMods.filter(x => x.name !== m.name);
                        else activeMods.push(m);
                        renderMods(); calculate();
                    };
                    g.appendChild(b);
                }
            });
        }

        function renderProc() {
            const g = document.getElementById('proc-list');
            const checked = Array.from(document.querySelectorAll('#proc-list input:checked')).map(i => i.dataset.name);
            g.innerHTML = "";
            const styleRaw = activeStyle.name.replace(/[0-9.\s]/g, '');
            DB.processes.forEach(p => {
                const isMatch = p.targets.some(t => {
                    const tRaw = t.replace(/[0-9.\s]/g, '');
                    return tRaw === "通用" || styleRaw.includes(tRaw) || tRaw.includes(styleRaw);
                });
                if(isMatch) {
                    const d = document.createElement('label');
                    d.className = "p-3 bg-slate-50 border rounded-xl flex items-center justify-between cursor-pointer hover:bg-white transition-all";
                    d.innerHTML = `
                        <div class="flex items-center gap-3">
                            <input type="checkbox" onchange="calculate()" data-name="${p.name}" ${checked.includes(p.name)?'checked':''} class="w-4 h-4 rounded">
                            <span class="text-[11px] font-bold text-slate-700">${p.name}</span>
                        </div>
                        <span class="text-[11px] font-black text-emerald-600">¥${p.price.toFixed(2)}</span>
                    `;
                    g.appendChild(d);
                }
            });
        }

        function renderFabrics() {
            const s = document.getElementById('f-search').value.toLowerCase();
            const g = document.getElementById('f-list'); g.innerHTML = "";
            DB.fabrics.filter(f => f.name.toLowerCase().includes(s)).forEach(f => {
                const act = selFabric?.id === f.id;
                const d = document.createElement('div');
                d.className = `p-4 border rounded-xl flex justify-between items-center cursor-pointer transition-all ${act ? 'bg-orange-50 border-orange-400 ring-2 ring-orange-100' : 'bg-white hover:border-slate-300'}`;
                d.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-xs font-black text-slate-800">${f.name}</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase mt-1">Roll MOQ: ${f.rollQty}</span>
                    </div>
                    <span class="text-sm font-black text-orange-600">¥${f.price_loose.toFixed(2)}</span>
                `;
                d.onclick = () => { selFabric = f; renderFabrics(); };
                g.appendChild(d);
            });
            calculate();
        }

        function updateSizes() {
            const keys = Object.keys(DB.styles[0].sizes);
            const sorted = activeSizes.sort((a,b) => keys.indexOf(a) - keys.indexOf(b));
            const mid = sorted[Math.floor(sorted.length / 2)];
            document.getElementById('size-info').innerText = mid ? "基准尺码 (中位偏大): " + mid : "请至少选择一个尺码";
            calculate();
        }

        function calculate() {
            const midText = document.getElementById('size-info').innerText;
            const mid = midText.includes(':') ? midText.split(': ')[1] : null;
            if(!activeStyle || !mid || !selFabric) return;

            let qCons = activeStyle.sizes[mid] || 0;
            let f = 1.0; activeMods.forEach(m => f *= m.factor); qCons *= f;

            let extra = 0;
            document.querySelectorAll('#proc-list input:checked').forEach(i => {
                const p = DB.processes.find(x => x.name === i.dataset.name);
                if(p) extra += p.price;
            });

            const rmb = (qCons * selFabric.price_loose * 1.1 + activeStyle.baseLabor + extra + 1.5) / 0.7;
            const usd = rmb / 6.7;

            document.getElementById('res-usd').innerText = usd.toFixed(2);
            document.getElementById('res-rmb').innerText = "¥ " + rmb.toFixed(2);
            
            let moq = Math.round(selFabric.rollQty / (qCons * 0.22));
            document.getElementById('res-moq').innerText = moq;

            const diff = usd < 1.5 ? 0.05 : usd < 3 ? 0.1 : usd < 5 ? 0.15 : 0.2;
            const tb = document.getElementById('tier-body'); tb.innerHTML = "";
            const curIdx = moq < 100 ? 0 : moq < 300 ? 1 : moq < 500 ? 2 : 3;
            const brks = [{l:"50-99", q:50}, {l:"100-299", q:100}, {l:"300-499", q:300}, {l:"500+", q:500}];
            
            brks.forEach((b, i) => {
                const p = usd + (curIdx - i) * diff;
                const tr = document.createElement('tr'); 
                tr.innerHTML = `
                    <td class="tier-td ${i===curIdx?'active-tier-td':''} text-[10px] tracking-widest uppercase">${b.l} PCS</td>
                    <td class="text-right font-black text-xl">$${p.toFixed(2)}</td>
                `;
                tb.appendChild(tr);
            });
        }

        function copyQuote() {
            const usd = document.getElementById('res-usd').innerText;
            const moq = document.getElementById('res-moq').innerText;
            const sales = document.getElementById('sales-sel').value;
            const client = document.getElementById('client').value;
            const text = `ASTON QUOTATION\nClient: ${client || 'N/A'}\nStyle: ${activeStyle.name}\nFabric: ${selFabric.name}\nBase Price: $${usd}\nMOQ: ${moq} pcs\nQuoted by: ${sales || 'ASTON AI'}\nValid for 7 days.`;
            navigator.clipboard.writeText(text);
            alert("报价摘要已复制到剪贴板！");
        }

        init();
    </script>

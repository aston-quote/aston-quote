            pkgs: [{"name": "普通包装", "price": 1.0, "desc": "简单款式，常规透明袋"}, {"name": "标准包装", "price": 1.5, "desc": "套装/成人单件，含挂牌、腰封、特殊包装"}, {"name": "礼盒包装", "price": 2.0, "desc": "成人套装，精品礼盒装"}],
            config: {"exchange_rate": 6.7, "margin_coefficient": 0.7, "packaging_cost": 0.0}
        };

        let activeStyle = DB.styles[1] || DB.styles[0];
        let activeMods = []; let activeSizes = []; let selFabric = DB.fabrics[0] || null;

        function init() {
            try {
                const st = document.getElementById('style-btns');
                DB.styles.forEach((s, i) => {
                    const b = document.createElement('button'); b.innerText = s.name;
                    b.className = `p-2 rounded-lg text-[10px] border font-bold ${i===1?'btn-active':'bg-white text-slate-500'}`;
                    b.onclick = () => {
                        document.querySelectorAll('#style-btns button').forEach(x => x.className = "p-2 rounded-lg text-[10px] border font-bold bg-white text-slate-500");
                        b.className = "p-2 rounded-lg text-[10px] border font-bold btn-active"; activeStyle = s; renderUI();
                    };
                    st.appendChild(b);
                });
                
                const sz = document.getElementById('size-btns');
                const keys = DB.styles[1] ? Object.keys(DB.styles[1].sizes) : [];
                keys.forEach(k => {
                    const b = document.createElement('button'); b.innerText = k;
                    b.className = "p-2 rounded-lg text-[10px] border bg-white text-slate-400 font-bold";
                    b.onclick = () => {
                        if(activeSizes.includes(k)) activeSizes = activeSizes.filter(x => x!==k); else activeSizes.push(k);
                        b.classList.toggle('btn-active'); b.classList.toggle('text-white'); b.classList.toggle('text-slate-400'); updateSizes();
                    };
                    sz.appendChild(b);
                });
                renderUI();
            } catch(e) { console.error(e); } 
            finally { setTimeout(() => document.getElementById('loading').style.display = 'none', 1000); }
        }

        function renderUI() { renderMods(); renderProc(); renderFabrics(); calculate(); }

        function renderMods() {
            const g = document.getElementById('mod-btns'); g.innerHTML = "";
            DB.modifiers.forEach(m => {
                if(m.target === "通用" || activeStyle.name.includes(m.target) || m.target.includes(activeStyle.name.split('.')[0])) {
                    const b = document.createElement('button'); b.innerText = m.name;
                    const act = activeMods.some(x => x.name === m.name);
                    b.className = `p-2 rounded-lg text-[10px] border font-bold ${act?'btn-active':'bg-white text-slate-500'}`;
                    b.onclick = () => {
                        if(act) activeMods = activeMods.filter(x => x.name !== m.name); else activeMods.push(m);
                        renderMods(); calculate();
                    };
                    g.appendChild(b);
                }
            });
        }

        function renderProc() {
            const g = document.getElementById('proc-btns');
            const checked = Array.from(document.querySelectorAll('#proc-btns input:checked')).map(i => i.dataset.name);
            g.innerHTML = "";
            DB.processes.forEach(p => {
                const match = p.targets.some(t => t === "通用" || activeStyle.name.includes(t) || t.includes(activeStyle.name.split('.')[0]));
                if(match) {
                    const d = document.createElement('div');
                    d.className = "p-3 bg-white border rounded-xl flex items-center justify-between";
                    d.innerHTML = `<div class="flex items-center gap-2"><input type="checkbox" onchange="calculate()" data-name="${p.name}" ${checked.includes(p.name)?'checked':''}> <span class="text-[10px] font-bold">${p.name}</span></div> <span class="text-[10px] text-emerald-600 font-bold">¥${p.price}</span>`;
                    g.appendChild(d);
                }
            });
        }

        function renderFabrics() {
            const s = document.getElementById('f-search').value.toLowerCase();
            const g = document.getElementById('f-list'); g.innerHTML = "";
            DB.fabrics.filter(f => f.name.toLowerCase().includes(s)).forEach(f => {
                const d = document.createElement('div');
                d.className = `p-3 border rounded-xl flex justify-between cursor-pointer ${selFabric?.id === f.id ? 'bg-orange-50 border-orange-400' : 'bg-white'}`;
                d.innerHTML = `<span class="text-[10px] font-bold">${f.name}</span> <span class="text-[10px] text-orange-600 font-bold">¥${f.price_loose}</span>`;
                d.onclick = () => { selFabric = f; renderFabrics(); };
                g.appendChild(d);
            });
            calculate();
        }

        function updateSizes() {
            const keys = DB.styles[1] ? Object.keys(DB.styles[1].sizes) : [];
            const sorted = activeSizes.sort((a,b) => keys.indexOf(a) - keys.indexOf(b));
            const mid = sorted[Math.floor(sorted.length / 2)];
            document.getElementById('ref-size').innerText = mid || "";
            document.getElementById('size-tip').style.display = mid ? 'block' : 'none';
            calculate();
        }

        function updateSummary() { document.getElementById('s-val').innerText = document.getElementById('sales').value; document.getElementById('c-val').innerText = document.getElementById('client').value; }

        function calculate() {
            const ref = document.getElementById('ref-size').innerText;
            if(!activeStyle || !ref || !selFabric) return;
            let qCons = activeStyle.sizes[ref] || 0;
            let f = 1.0; activeMods.forEach(m => f *= m.factor); qCons *= f;
            document.getElementById('display-cons').innerText = qCons.toFixed(3);

            let extra = 0;
            document.querySelectorAll('#proc-btns input:checked').forEach(i => {
                const p = DB.processes.find(x => x.name === i.dataset.name);
                if(p) extra += p.price;
            });

            const rmb = (qCons * selFabric.price_loose * 1.1 + activeStyle.baseLabor + extra + 1.5) / (DB.config.margin_coefficient || 0.7);
            const usd = rmb / (DB.config.exchange_rate || 6.7);
            document.getElementById('res-usd').innerText = usd.toFixed(2);
            document.getElementById('res-rmb').innerText = "¥ " + rmb.toFixed(2);
            
            let moq = Math.round(selFabric.rollQty / (qCons * 0.22));
            document.getElementById('res-moq').innerText = moq;

            const diff = usd < 1.5 ? 0.05 : usd < 3 ? 0.1 : usd < 5 ? 0.15 : 0.2;
            const tb = document.getElementById('tier-body'); tb.innerHTML = "";
            const curIdx = moq < 100 ? 0 : moq < 300 ? 1 : moq < 500 ? 2 : 3;
            const brks = [{l:"0-99"}, {l:"100-299"}, {l:"300-499"}, {l:">500"}];
            brks.forEach((b, i) => {
                const p = usd + (curIdx - i) * diff;
                const tr = document.createElement('tr'); if(i===curIdx) tr.className = "active-tier";
                tr.innerHTML = `<td>${b.l}</td><td class="text-right">$${p.toFixed(2)}</td>`;
                tb.appendChild(tr);
            });
        }
        init();
    </script>

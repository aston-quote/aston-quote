<html lang="zh-CN">
<head>

    <style>

        .btn-active { background: #2563eb !important; color: white !important; border-color: #2563eb !important; }
        .tier-td { padding: 10px; background: #1e293b; color: white; font-weight: 700; border-radius: 8px; }

                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">

            <div class="card p-6 space-y-4">

                <div id="manual-area" class="hidden p-4 bg-blue-50 border border-blue-200 rounded-xl grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold text-blue-800">Manual Labor (RMB)</label><input type="number" id="m-labor" value="25" oninput="calculate()" class="w-full p-2 border rounded-lg mt-1"></div>

                        <p id="size-info" class="text-xs font-bold text-blue-600 mt-1"></p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card p-6 space-y-3"><h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">02. Modifiers</h3><div id="mod-btns" class="grid grid-cols-2 gap-2"></div></div>

            </div>

            <div class="card p-6 space-y-4">
                <h3 class="text-xs font-black text-emerald-600 uppercase tracking-widest">04. Processes & Accessories</h3>
                <div id="proc-list" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
            </div>

            <div class="card p-6 space-y-4">
                <h3 class="text-xs font-black text-orange-600 uppercase tracking-widest">05. Fabric Database & Manual Fabric</h3>
                <div id="manual-f-area" class="p-4 bg-orange-50 border border-orange-200 rounded-xl grid grid-cols-3 gap-4 mb-4">

                    <div><label class="text-[10px] font-bold text-orange-800">GSM</label><input type="number" id="mf-gsm" value="0" class="w-full p-2 border rounded-lg mt-1 text-sm"></div>
                    <div><label class="text-[10px] font-bold text-orange-800">Width (cm)</label><input type="number" id="mf-width" value="0" class="w-full p-2 border rounded-lg mt-1 text-sm"></div>
                </div>

                <div id="f-list" class="max-h-60 overflow-y-auto space-y-2 pr-2"></div>
            </div>

            <div class="card p-6 space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">06. Packaging</h3>
                <div id="pkg-btns" class="grid grid-cols-3 gap-2"></div>

                    <span class="text-[10px] font-bold text-slate-500">Manual Packaging (RMB)</span>
                    <input type="number" id="m-pkg" value="0" oninput="calculate()" class="w-24 p-2 border rounded-lg text-sm font-black text-right">
                </div>
            </div>
        </div>

        <div class="w-full md:w-96">
            <div class="card bg-slate-900 text-white p-8 space-y-8 sticky top-8 shadow-2xl text-center">

            const s=document.getElementById('f-search').value.toLowerCase();
            const g=document.getElementById('f-list'); g.innerHTML="";
            DB.fabrics.filter(f=>f.name.toLowerCase().includes(s)||f.id.includes(s)).forEach(f=>{
                const act=selFabric?.id===f.id;
                const d=document.createElement('div');
                d.className=`p-3 border rounded-xl flex justify-between items-center cursor-pointer ${act?'bg-orange-50 border-orange-400 ring-2 ring-orange-100':'bg-white hover:border-slate-300'}`;
                d.innerHTML=`<div class="flex flex-col"><span class="text-[10px] text-slate-400 font-bold uppercase">ID: ${f.id} | ${f.desc}</span><span class="text-sm font-black text-slate-800">${f.name}</span><span class="text-[9px] text-slate-400 font-bold tracking-widest">${f.gsm}GSM / ${f.width}CM</span></div><div class="text-right"><span class="text-xs font-black text-orange-600 block">¥${f.price_loose.toFixed(2)} (散)</span><span class="text-[10px] font-bold text-slate-500">¥${f.price_roll.toFixed(2)} (整)</span></div>`;
                d.onclick=()=>{ selFabric=f; document.getElementById('mf-price').value=0; renderFabrics(); };
                g.appendChild(d);
            });
            calculate();
        }

        function updateSizes() {
            const keys=Object.keys(activeStyle.sizes);
            const sorted=activeSizes.sort((a,b)=>keys.indexOf(a)-keys.indexOf(b));
            const mid=sorted[Math.floor(sorted.length/2)];
            document.getElementById('size-info').innerText=mid?"基准尺码: "+mid:"";
            calculate();
        }

        function calculate() {
            const mText=document.getElementById('size-info').innerText;
            const mid=mText.includes(': ')?mText.split(': ')[1]:null;
            let qCons=0, labor=0;
            if(activeStyle.name.includes("手动")) {
                qCons=parseFloat(document.getElementById('m-cons').value)||0; labor=parseFloat(document.getElementById('m-labor').value)||0;
            } else {
                if(!mid) return; qCons=activeStyle.sizes[mid]||0; labor=activeStyle.baseLabor;
            }
            let fPrice=0;
            if(selFabric) { fPrice=selFabric.price_loose; }
            else { fPrice=parseFloat(document.getElementById('mf-price').value)||0; }
            
            let f=1.0; activeMods.forEach(m=>f*=m.factor); qCons*=f;
            let moq=Math.round(20/(qCons*0.22)); document.getElementById('res-moq').innerText=moq;

            let extra=0;
            document.querySelectorAll('#proc-list input:checked').forEach(i=>{
                let p=DB.processes.find(x=>x.name===i.dataset.name);
                if(p) {
                    let pPrice = p.price;
                    if(p.name.includes("定染拉链")) {
                        if(moq<300) pPrice=2.8; else if(moq<1000) pPrice=2.2; else if(moq<3000) pPrice=1.6; else pPrice=1.2;
                    }
                    extra += pPrice;
                }
            });

            const pkgP = parseFloat(document.getElementById('m-pkg').value) || activePkg.price;
            const rmb=(qCons*fPrice*1.1+labor+extra+pkgP)/0.7;
            const usd=rmb/6.7;
            document.getElementById('res-usd').innerText=usd.toFixed(2);
            document.getElementById('res-rmb').innerText="¥ "+rmb.toFixed(2);

            const diff=usd<1.5?0.05:usd<3?0.1:usd<5?0.15:0.2;
            const tb=document.getElementById('tier-body'); tb.innerHTML="";
            const curIdx=moq<100?0:moq<300?1:moq<500?2:3;
            const brks=["0-99","100-299","300-499",">500"];
            brks.forEach((l,i)=>{
                const p=usd+(curIdx-i)*diff;
                tb.innerHTML+=`<tr><td class="tier-td ${i===curIdx?'active-tier-td':''} text-[10px] tracking-widest uppercase">${l} PCS</td><td class="text-right font-black text-2xl">$${p.toFixed(2)}</td></tr>`;
            });
        }
        init();
    </script>
</body>
</html>
